name: Build and Deploy

on:
  push:
      branches:
            - master

            permissions:
              contents: write

              jobs:
                build-and-deploy:
                    runs-on: ubuntu-latest

                        steps:
                              - name: Checkout
                                      uses: actions/checkout@v4

                                            - name: Setup Node
                                                    uses: actions/setup-node@v4
                                                            with:
                                                                      node-version: 20

                                                                            - name: Install pnpm
                                                                                    uses: pnpm/action-setup@v3
                                                                                            with:
                                                                                                      version: 9
                                                                                                      
                                                                                                            - name: Install dependencies
                                                                                                                    run: pnpm install
                                                                                                                    
                                                                                                                          - name: Build
                                                                                                                                  working-directory: artifacts/consulting-website
                                                                                                                                          env:
                                                                                                                                                    PORT: 3000
                                                                                                                                                              BASE_PATH: /
                                                                                                                                                                        NODE_ENV: production
                                                                                                                                                                                run: pnpm run build
                                                                                                                                                                                
                                                                                                                                                                                      - name: Copy build output to root
                                                                                                                                                                                              run: |
                                                                                                                                                                                                        cp -r artifacts/consulting-website/dist/public/assets ./assets
                                                                                                                                                                                                                  cp artifacts/consulting-website/dist/public/index.html ./index.html
                                                                                                                                                                                                                  
                                                                                                                                                                                                                        - name: Commit and push build output
                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                          git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                    git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                              git add assets/ index.html
                                                                                                                                                                                                                                                                        git diff --staged --quiet || git commit -m "Auto-build: update compiled assets"
                                                                                                                                                                                                                                                                                  git push
