kind = "web"
previewPath = "/"
title = "Personal Consulting Website"
version = "1.0.0"
id = "artifacts/consulting-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23624
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/consulting-website run dev"

[services.env]
PORT = "23624"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/consulting-website", "run", "build"]
publicDir = "artifacts/consulting-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
