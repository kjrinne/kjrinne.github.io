  <script>
    // Rewrite old route hrefs to new ones, and force full-page nav (bypasses React Router)
    function fixLinks() {
      document.querySelectorAll('a[href="/experience"]').forEach(function(a) { a.setAttribute('href', '/resume'); });
      document.querySelectorAll('a[href="/case-studies"]').forEach(function(a) { a.setAttribute('href', '/projects'); });
    }
    fixLinks();
    new MutationObserver(fixLinks).observe(document.documentElement, { childList: true, subtree: true });
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a');
      if (!link) return;
      var href = link.getAttribute('href');
      if (href === '/resume' || href === '/projects') {
        e.stopImmediatePropagation();
        e.preventDefault();
        window.location.href = href;
      }
    }, true);
  </script>
