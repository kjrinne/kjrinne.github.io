<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects &mdash; Kai Rinne</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; -webkit-font-smoothing: antialiased; }
    nav { position: fixed; top: 0; left: 0; right: 0; background: white; border-bottom: 1px solid #f0f0f0; height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; z-index: 100; }
    nav a { text-decoration: none; color: #111; }
    .nav-logo { font-weight: 700; font-size: 0.95rem; border: 1.5px solid #111; padding: 0.3rem 0.5rem; letter-spacing: 0.02em; }
    .nav-links { display: flex; gap: 2rem; font-size: 0.8rem; letter-spacing: 0.03em; }
    .nav-links a { color: #555; }
    .nav-links a:hover { color: #111; }
    main { max-width: 900px; margin: 0 auto; padding: 7rem 2rem 5rem; }
    .page-label { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: #aaa; margin-bottom: 0.75rem; }
    .section-title { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 3rem; color: #111; }
    .cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
    .card { display: block; text-decoration: none; color: inherit; border: 1px solid #f0f0f0; border-radius: 8px; overflow: hidden; transition: box-shadow 0.2s ease, transform 0.2s ease; }
    .card:hover { box-shadow: 0 8px 32px rgba(0,0,0,0.10); transform: translateY(-2px); }
    .card-image { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: #f5f5f5; }
    .card-body { padding: 1.25rem 1.25rem 1.5rem; }
    .card-label { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: #aaa; margin-bottom: 0.5rem; }
    .card-title { font-size: 0.9rem; font-weight: 600; line-height: 1.4; color: #111; }
    .card-cta { display: inline-block; margin-top: 1rem; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #555; border-bottom: 1px solid #ddd; padding-bottom: 1px; }
    .card:hover .card-cta { color: #111; border-color: #111; }
    @media (max-width: 640px) {
      .nav-links { gap: 1.25rem; }
      main { padding: 6rem 1.25rem 4rem; }
      .cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">KR</a>
    <div class="nav-links">
      <a href="/about">About</a>
      <a href="/resume">Resume</a>
      <a href="/projects">Projects</a>
      <a href="/contact">Contact</a>
    </div>
  </nav>
  <main>
    <p class="page-label">Projects</p>
    <h1 class="section-title">Case Competitions</h1>
    <div class="cards-grid">

      <a class="card" href="/Arcteryx Case.pdf" target="_blank" rel="noopener noreferrer">
        <img class="card-image" src="/arcteryx-preview.png" alt="Arc'teryx Case Competition preview slide" />
        <div class="card-body">
          <p class="card-label">Case Competition &middot; 2026</p>
          <p class="card-title">Arc'teryx Case Competition (2026) &mdash; Finalist</p>
          <span class="card-cta">View Deck &rarr;</span>
        </div>
      </a>

      <a class="card" href="/Bain Case Competition.pdf" target="_blank" rel="noopener noreferrer">
        <img class="card-image" src="/bain-preview.png" alt="Bain & Company Case Competition preview slide" />
        <div class="card-body">
          <p class="card-label">Case Competition &middot; 2026</p>
          <p class="card-title">Bain &amp; Company Case Competition (2026) &mdash; Semi-Finalist</p>
          <span class="card-cta">View Deck &rarr;</span>
        </div>
      </a>

    </div>
  </main>
</body>
</html>
